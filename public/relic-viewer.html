<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>Rogue Shuffle — 유물 목록</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      padding: 24px;
    }

    h1 {
      text-align: center;
      font-size: 22px;
      margin-bottom: 8px;
      color: #f0c040;
      letter-spacing: 2px;
    }

    .subtitle {
      text-align: center;
      color: #888;
      font-size: 12px;
      margin-bottom: 24px;
    }

    .filters {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .filter-btn {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid #444;
      background: #2a2a3e;
      color: #ccc;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
    }

    .filter-btn:hover {
      background: #3a3a5e;
    }

    .filter-btn.active {
      border-color: #f0c040;
      color: #f0c040;
      background: #2a2a3e;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .card {
      background: #16213e;
      border-radius: 10px;
      border: 1px solid #2a2a4e;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: transform 0.15s;
    }

    .card:hover {
      transform: translateY(-2px);
    }

    .card.common {
      border-left: 4px solid #9e9e9e;
    }

    .card.rare {
      border-left: 4px solid #42a5f5;
    }

    .card.epic {
      border-left: 4px solid #ab47bc;
    }

    .card.disabled {
      opacity: 0.4;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .img-box {
      width: 48px;
      height: 48px;
      background: #0f3460;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #666;
      flex-shrink: 0;
      overflow: hidden;
    }

    .img-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .card-title {
      flex: 1;
    }

    .card-name {
      font-size: 15px;
      font-weight: bold;
      color: #fff;
    }

    .card-id {
      font-size: 10px;
      color: #555;
      margin-top: 2px;
    }

    .badge-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .badge {
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: bold;
    }

    .badge.common {
      background: #424242;
      color: #bbb;
    }

    .badge.rare {
      background: #1565c0;
      color: #90caf9;
    }

    .badge.epic {
      background: #6a1b9a;
      color: #ce93d8;
    }

    .badge.use-y {
      background: #1b5e20;
      color: #a5d6a7;
    }

    .badge.use-n {
      background: #b71c1c;
      color: #ef9a9a;
    }

    .desc {
      font-size: 13px;
      color: #ccc;
      line-height: 1.5;
    }

    .effects-label {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .effect-item {
      background: #0d1b2a;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 11px;
      color: #aaa;
      font-family: 'Consolas', monospace;
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.6;
    }

    .scope-tag {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: bold;
      margin-right: 4px;
    }

    .scope-card {
      background: #1a3a1a;
      color: #81c784;
    }

    .scope-hand {
      background: #1a2a3a;
      color: #64b5f6;
    }

    .scope-final {
      background: #3a1a2a;
      color: #f48fb1;
    }

    .scope-special {
      background: #3a2a0a;
      color: #ffcc80;
    }

    .scope-onRemove {
      background: #2a1a3a;
      color: #b39ddb;
    }

    .count {
      text-align: center;
      color: #555;
      font-size: 12px;
      margin-top: 8px;
    }
  </style>
</head>

<body>

  <h1>⚗ Rogue Shuffle — 유물 목록</h1>
  <p class="subtitle" id="subtitle">총 0개</p>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">전체</button>
    <button class="filter-btn" data-filter="common">Common</button>
    <button class="filter-btn" data-filter="rare">Rare</button>
    <button class="filter-btn" data-filter="epic">Epic</button>
    <button class="filter-btn" data-filter="Y">사용 Y</button>
    <button class="filter-btn" data-filter="N">사용 N</button>
    <div style="width: 1px; height: 20px; background: #444; margin: 0 5px;"></div>
    <button class="filter-btn" id="btn-deploy" style="background:#4a2a2a; border-color:#e06060; color:#ff9999;">[언어배포]
      Copy lang.json</button>
  </div>
  <div class="grid" id="grid"></div>
  <p class="count" id="count"></p>

  <script>
    const IMG_BASE = './assets/images/relic/';
    const HAND_RANK_NAME = { 0: 'HIGH_CARD', 1: 'ONE_PAIR', 2: 'TRIPLE', 3: 'TWO_PAIR', 4: 'STRAIGHT', 5: 'FLUSH_DRAW', 6: 'STRAIGHT (rank6)', 7: 'FLUSH', 8: 'FULL_HOUSE', 9: 'FOUR_CARD', 10: 'STRAIGHT_FLUSH', 11: 'FIVE_CARD' };

    let currentFilter = 'all';
    let allRelics = [];

    function formatEffect(e) {
      const parts = [];
      parts.push(`scope: ${e.scope}`);
      parts.push(`type: ${e.type}`);
      if (e.value !== undefined) parts.push(`value: ${e.value}`);
      if (e.handRank !== undefined) parts.push(`handRank: ${e.handRank} (${HAND_RANK_NAME[e.handRank] ?? '?'})`);
      if (e.condition) {
        const cond = e.condition;
        const condParts = [];
        if (cond.suit) condParts.push(`suit=${cond.suit}`);
        if (cond.handRank != null) condParts.push(`handRank=${cond.handRank} (${HAND_RANK_NAME[cond.handRank] ?? '?'})`);
        if (cond.deckCountGte) condParts.push(`deck >= ${cond.deckCountGte}`);
        if (cond.deckCountLte != null) condParts.push(`deck <= ${cond.deckCountLte}`);
        if (cond.cardValSumLt != null) condParts.push(`카드합 < ${cond.cardValSumLt}`);
        if (cond.isFullHp) condParts.push(`isFullHp`);
        if (condParts.length) parts.push(`조건: ${condParts.join(', ')}`);
      }
      if (e.suit) parts.push(`suit: ${e.suit}`);
      if (e.aliasTo) parts.push(`aliasTo: ${e.aliasTo}`);
      return parts.join('\n');
    }

    function render() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      const filtered = allRelics.filter(r => {
        if (currentFilter === 'all') return true;
        if (currentFilter === 'Y' || currentFilter === 'N') return r.useYn === currentFilter;
        return r.rarity === currentFilter;
      });

      document.getElementById('subtitle').textContent = `총 ${allRelics.length}개`;
      document.getElementById('count').textContent = `표시 중: ${filtered.length} / ${allRelics.length}`;

      filtered.forEach(r => {
        const card = document.createElement('div');
        card.className = `card ${r.rarity}${r.useYn === 'N' ? ' disabled' : ''}`;

        const effectsHtml = r.effects.map(e => {
          return `<div class="effect-item"><span class="scope-tag scope-${e.scope}">${e.scope}</span>${formatEffect(e)}</div>`;
        }).join('');

        card.innerHTML = `
      <div class="card-header">
        <div class="img-box">
          <img src="${IMG_BASE}${r.img}" alt="${r.name}" onerror="this.parentElement.textContent='${r.img}'">
        </div>
        <div class="card-title">
          <div class="card-name">${r.name}</div>
          <div class="card-id">${r.id}</div>
        </div>
      </div>
      <div class="badge-row">
        <span class="badge ${r.rarity}">${r.rarity}</span>
        <span class="badge ${r.useYn === 'Y' ? 'use-y' : 'use-n'}">사용 ${r.useYn}</span>
      </div>
      <div class="desc">${r.description}</div>
      <div class="effects-label">Effects</div>
      ${effectsHtml}
    `;

        grid.appendChild(card);
      });
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        render();
      });
    });

    document.getElementById('btn-deploy').addEventListener('click', async () => {
      try {
        const langRes = await fetch('/dev-data/lang.json');
        if (!langRes.ok) throw new Error("lang.json fetch fallback");
        const langData = await langRes.json();

        // Update KO
        const koRelic = {};
        const enRelic = langData.en?.relic ?? {};

        allRelics.forEach(r => {
          koRelic[r.id] = { name: r.name, desc: r.description };
          if (!enRelic[r.id]) {
            enRelic[r.id] = { name: `[TODO] ${r.name}`, desc: `[TODO] ${r.description}` };
          }
        });

        langData.ko = langData.ko || {};
        langData.ko.relic = koRelic;

        langData.en = langData.en || {};
        langData.en.relic = enRelic;

        const newJson = JSON.stringify(langData, null, 2);
        await navigator.clipboard.writeText(newJson);
        alert('lang.json 코드가 클립보드에 복사되었습니다!\nsrc/data/lang.json 파일에 붙여넣기 하세요.');
      } catch (err) {
        alert('lang.json을 불러올 수 없습니다. dev 서버가 켜져 있는지 확인해주세요.\n' + err.message);
      }
    });

    fetch('/dev-data/relic.json')
      .then(r => r.json())
      .then(data => {
        allRelics = data.relics;
        render();
      })
      .catch(err => {
        document.getElementById('grid').innerHTML =
          `<p style="color:#f88;grid-column:1/-1">relic.json 로드 실패: ${err.message}<br>dev 서버(npm run dev)가 실행 중인지 확인하세요.</p>`;
      });
  </script>
</body>

</html>
