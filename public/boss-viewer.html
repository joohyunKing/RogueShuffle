<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>Rogue Shuffle — 보스 목록</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      padding: 24px;
    }

    h1 {
      text-align: center;
      font-size: 22px;
      margin-bottom: 8px;
      color: #f0c040;
      letter-spacing: 2px;
    }

    .subtitle {
      text-align: center;
      color: #888;
      font-size: 12px;
      margin-bottom: 24px;
    }

    .filters {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .filter-btn {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid #444;
      background: #2a2a3e;
      color: #ccc;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
    }

    .filter-btn:hover { background: #3a3a5e; }
    .filter-btn.active { border-color: #f0c040; color: #f0c040; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 20px;
    }

    .card {
      background: #16213e;
      border-radius: 10px;
      border: 1px solid #2a2a4e;
      border-left: 4px solid #555;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: transform 0.15s;
    }

    .card:hover { transform: translateY(-2px); }
    .card.disabled { opacity: 0.4; }
    .card.use-y { border-left-color: #e53935; }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .img-box {
      width: 64px;
      height: 64px;
      background: #0f3460;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #666;
      flex-shrink: 0;
      overflow: hidden;
    }

    .img-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .card-title { flex: 1; }

    .card-name {
      font-size: 17px;
      font-weight: bold;
      color: #fff;
    }

    .card-id {
      font-size: 10px;
      color: #555;
      margin-top: 2px;
    }

    .badge-row {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    .badge {
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: bold;
    }

    .badge.use-y  { background: #1b5e20; color: #a5d6a7; }
    .badge.use-n  { background: #b71c1c; color: #ef9a9a; }
    .badge.init   { background: #1a237e; color: #90caf9; }
    .badge.summon { background: #4a148c; color: #ce93d8; }

    /* stat scale */
    .stat-row {
      display: flex;
      gap: 8px;
    }

    .stat-box {
      flex: 1;
      background: #0d1b2a;
      border-radius: 6px;
      padding: 6px 8px;
      text-align: center;
      font-size: 11px;
    }

    .stat-box .stat-label { color: #666; margin-bottom: 2px; }
    .stat-box .stat-val   { color: #f0c040; font-weight: bold; font-size: 13px; }

    /* passive */
    .section-label {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .passive-box {
      background: #0d1b2a;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
      color: #ffcc80;
      font-family: 'Consolas', monospace;
      white-space: pre-wrap;
      line-height: 1.6;
    }

    /* phases */
    .phase-list { display: flex; flex-direction: column; gap: 6px; }

    .phase-item {
      background: #0d1b2a;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
      font-family: 'Consolas', monospace;
      line-height: 1.7;
    }

    .phase-label {
      font-weight: bold;
      color: #ef9a9a;
      margin-bottom: 4px;
    }

    .phase-threshold { color: #666; font-size: 11px; }

    .action-item { color: #aaa; }
    .action-skill { color: #90caf9; }
    .action-attack { color: #a5d6a7; }
    .action-summon { color: #ce93d8; }

    /* skills */
    .skill-list { display: flex; flex-direction: column; gap: 4px; }

    .skill-item {
      background: #0d1b2a;
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 11px;
      color: #aaa;
      font-family: 'Consolas', monospace;
      line-height: 1.6;
    }

    .skill-name { color: #fff; font-size: 12px; font-weight: bold; margin-bottom: 2px; }

    .count {
      text-align: center;
      color: #555;
      font-size: 12px;
      margin-top: 12px;
    }
  </style>
</head>

<body>

  <h1>👹 Rogue Shuffle — 보스 목록</h1>
  <p class="subtitle" id="subtitle">총 0개</p>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">전체</button>
    <button class="filter-btn" data-filter="Y">사용 Y</button>
    <button class="filter-btn" data-filter="N">사용 N</button>
  </div>

  <div class="grid" id="grid"></div>
  <p class="count" id="count"></p>

  <script>
    const IMG_BASE = './assets/images/monster/';
    let currentFilter = 'all';
    let allBosses = [];

    function formatPassive(p) {
      if (!p) return null;
      const lines = [];
      lines.push(`type: ${p.type}`);
      if (p.triggerOn) lines.push(`trigger: ${p.triggerOn}`);
      if (p.value !== undefined) lines.push(`value: ${p.value}`);
      if (p.threshold !== undefined) lines.push(`threshold: ${p.threshold}`);
      if (p.ratio !== undefined) lines.push(`ratio: ${p.ratio}`);
      return lines.join('\n');
    }

    function formatSkill(skill) {
      const lines = [];
      lines.push(`type: ${skill.type}`);
      if (skill.damMult !== undefined) lines.push(`damMult: ×${skill.damMult}`);
      if (skill.stat !== undefined) lines.push(`stat: ${skill.stat}`);
      if (skill.value !== undefined) lines.push(`value: ${skill.value}`);
      if (skill.ratio !== undefined) lines.push(`ratio: ${skill.ratio}`);
      if (skill.debuffId !== undefined) lines.push(`debuffId: ${skill.debuffId}`);
      if (skill.count !== undefined) lines.push(`count: ${skill.count}`);
      return lines.join(' · ');
    }

    function actionHtml(action, skills) {
      if (action.type === 'attack') {
        return `<div class="action-item action-attack">⚔ attack</div>`;
      }
      if (action.type === 'summon_or_attack') {
        return `<div class="action-item action-summon">✦ summon_or_attack</div>`;
      }
      if (action.type === 'skill') {
        const skill = skills?.[action.skillId];
        const detail = skill ? ` — ${skill.name} (${skill.type})` : '';
        return `<div class="action-item action-skill">★ ${action.skillId}${detail}</div>`;
      }
      return `<div class="action-item">${action.type}</div>`;
    }

    function render() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      const filtered = allBosses.filter(b => {
        if (currentFilter === 'all') return true;
        return b.useYn === currentFilter;
      });

      document.getElementById('subtitle').textContent = `총 ${allBosses.length}개`;
      document.getElementById('count').textContent = `표시 중: ${filtered.length} / ${allBosses.length}`;

      filtered.forEach(boss => {
        const card = document.createElement('div');
        const isActive = boss.useYn === 'Y';
        card.className = `card${isActive ? ' use-y' : ''}${!isActive ? ' disabled' : ''}`;

        const passiveStr = formatPassive(boss.passive);

        const phasesHtml = (boss.phases ?? []).map(phase => {
          const actionsHtml = (phase.actions ?? []).map(a => actionHtml(a, boss.skills)).join('');
          const hpPct = phase.hpThreshold > 0 ? `HP ≥ ${Math.round(phase.hpThreshold * 100)}%` : 'HP < 이전 단계';
          return `
            <div class="phase-item">
              <div class="phase-label">${phase.label ?? '페이즈'} <span class="phase-threshold">(${hpPct})</span></div>
              ${actionsHtml}
            </div>`;
        }).join('');

        const skillsHtml = Object.entries(boss.skills ?? {}).map(([id, skill]) => `
          <div class="skill-item">
            <div class="skill-name">${skill.name} <span style="color:#555;font-size:10px;">[${id}]</span></div>
            ${formatSkill(skill)}
          </div>`
        ).join('');

        const summonsHtml = (boss.summons ?? []).map(s =>
          `<span class="badge summon">소환: ${s.monsterId} ×${s.count ?? 1}</span>`
        ).join('');

        card.innerHTML = `
          <div class="card-header">
            <div class="img-box">
              <img src="${IMG_BASE}${boss.img ?? ''}" alt="${boss.name}"
                onerror="this.parentElement.textContent='no img'">
            </div>
            <div class="card-title">
              <div class="card-name">${boss.name}</div>
              <div class="card-id">${boss.id}</div>
            </div>
          </div>

          <div class="badge-row">
            <span class="badge ${isActive ? 'use-y' : 'use-n'}">사용 ${boss.useYn}</span>
            ${boss.initSkill ? '<span class="badge init">initSkill ✓</span>' : ''}
            ${summonsHtml}
          </div>

          <div>
            <div class="section-label">Stat Scale</div>
            <div class="stat-row">
              <div class="stat-box"><div class="stat-label">HP</div><div class="stat-val">×${boss.statScale?.hp ?? 1}</div></div>
              <div class="stat-box"><div class="stat-label">ATK</div><div class="stat-val">×${boss.statScale?.atk ?? 1}</div></div>
              <div class="stat-box"><div class="stat-label">DEF</div><div class="stat-val">×${boss.statScale?.def ?? 1}</div></div>
            </div>
          </div>

          ${passiveStr ? `
          <div>
            <div class="section-label">Passive</div>
            <div class="passive-box">${passiveStr}</div>
          </div>` : ''}

          <div>
            <div class="section-label">Phases</div>
            <div class="phase-list">${phasesHtml}</div>
          </div>

          ${skillsHtml ? `
          <div>
            <div class="section-label">Skills</div>
            <div class="skill-list">${skillsHtml}</div>
          </div>` : ''}
        `;

        grid.appendChild(card);
      });
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        render();
      });
    });

    fetch('/dev-data/boss.json')
      .then(r => r.json())
      .then(data => {
        allBosses = data.bosses;
        render();
      })
      .catch(err => {
        document.getElementById('grid').innerHTML =
          `<p style="color:#f88;grid-column:1/-1">boss.json 로드 실패: ${err.message}<br>dev 서버(npm run dev)가 실행 중인지 확인하세요.</p>`;
      });
  </script>
</body>

</html>
